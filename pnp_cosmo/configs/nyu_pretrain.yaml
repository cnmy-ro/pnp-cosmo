prj_name: nyu_brain_dicom_t1t2
run_name: trial
seed: 0
device: cuda
num_training_iters: 400000
val_freq: 5000  # iters
log_freq: 100
checkpoint_root: /exports/lkeb-hpc/csrao/training_logs/nyu_brain_dicom_t1t2
load_checkpoint: null


# Data
dataset:
  root: D:/Datasets/NYU_fastMRI/brain_dicom_t1t2_dataset
  fold: 1  # Crossval
  fetch_body: True
  size_divisor: 4
  paired: False  # PFT


# Model
autoencoder:  # Common settings for both autoencoders
  in_channels: 1
  content_channels: 2
  style_latent_size: 2
  num_filters: 32
  max_num_filters: 256
  num_features_mlp: 256
  num_res_blocks: 4
  num_downsamples_style: 4
  num_downsamples_content: 0
  num_layers_mlp: 2
  content_norm_type: instance
  style_norm_type: null
  weight_norm_type: spectral
  output_nonlinearity: tanh

discriminator:  # Common settings for both discriminators
  num_discriminators: 3
  kernel_size: 3
  in_channels: 2
  num_filters: 64
  num_layers: 4
  max_num_filters: 512
  activation_norm_type: null
  weight_norm_type: spectral

criteria:
  gan:
    weight: 1.0
    function: lsgan
  image_self: 
    weight: 1.0  
  content_self:
    weight: 1.0  # PFT
  style_self:
    weight: 1.0  # PFT   
  image_cycle:
    weight: 1.0  # PFT
  content_kl:
    weight: 0.0000001
  image_cross:   # PFT
    weight: 0.0
  content_cross: # PFT
    weight: 0.0 

optimizer:
  lr_autoenc: 0.0001
  lr_dis: 0.0004
  
body_conditioned_dis: True
paired_finetuning: False  # PFT